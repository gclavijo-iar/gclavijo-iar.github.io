<script>
  const supabaseUrl = "https://wptspqcmjstvuwugcepu.supabase.co";
  const supabaseKey = "TU_PUBLIC_ANON_KEY";
  const client = window.supabase.createClient(supabaseUrl, supabaseKey);

  const message = document.getElementById("message");
  const passwordInput = document.getElementById("password");
  const confirmInput = document.getElementById("confirmPassword");
  const saveBtn = document.getElementById("saveBtn");

  let userEmail = null;

  // Obtener tokens desde la URL
  const hash = window.location.hash.substring(1);
  const params = new URLSearchParams(hash);
  const access_token = params.get('access_token');
  const refresh_token = params.get('refresh_token');

  async function initSession() {
    if (!access_token) {
      message.textContent = "Enlace inválido o expirado.";
      saveBtn.disabled = true;
      return;
    }

    const { error } = await client.auth.setSession({
      access_token,
      refresh_token
    });

    if (error) {
      message.textContent = "Token inválido o expirado.";
      saveBtn.disabled = true;
      return;
    }

    // Obtener email del usuario
    const { data } = await client.auth.getUser();
    userEmail = data?.user?.email;
  }

  initSession();

  // Limpiar mensajes al escribir
  passwordInput.addEventListener("input", () => {
    message.textContent = "";
    message.classList.remove("success");
  });

  confirmInput.addEventListener("input", () => {
    message.textContent = "";
    message.classList.remove("success");
  });

  // Guardar contraseña
  saveBtn.addEventListener("click", async () => {

    const password = passwordInput.value;
    const confirmPassword = confirmInput.value;

    const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/;

    if (!regex.test(password)) {
      message.textContent = "Debe tener mínimo 8 caracteres, mayúscula, minúscula, número y símbolo.";
      return;
    }

    if (password !== confirmPassword) {
      message.textContent = "Las contraseñas no coinciden.";
      return;
    }

    // 1️⃣ Actualizar contraseña
    const { error } = await client.auth.updateUser({ password });

    if (error) {
      message.textContent = "Error: " + error.message;
      return;
    }

    // 2️⃣ Cerrar sesión actual
    await client.auth.signOut();

    // 3️⃣ Intentar login automático
    const { error: loginError } = await client.auth.signInWithPassword({
      email: userEmail,
      password: password
    });

    if (loginError) {
      showPopup("❌ Contraseña actualizada, pero el login falló.");
    } else {
      showPopup("✅ Contraseña actualizada y sesión iniciada correctamente.");
    }

  });

  // Popup moderno
  function showPopup(text) {
    const popup = document.createElement("div");
    popup.innerText = text;

    popup.style.position = "fixed";
    popup.style.top = "20px";
    popup.style.right = "20px";
    popup.style.background = "#333";
    popup.style.color = "#fff";
    popup.style.padding = "15px 20px";
    popup.style.borderRadius = "8px";
    popup.style.boxShadow = "0 5px 15px rgba(0,0,0,0.3)";
    popup.style.zIndex = "9999";
    popup.style.opacity = "0";
    popup.style.transition = "opacity 0.3s ease";

    document.body.appendChild(popup);

    setTimeout(() => popup.style.opacity = "1", 100);

    setTimeout(() => {
      popup.style.opacity = "0";
      setTimeout(() => popup.remove(), 300);
    }, 4000);
  }
</script>
