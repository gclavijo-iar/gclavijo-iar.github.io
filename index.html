<!DOCTYPE html> <html lang="es"> <head> <meta charset="UTF-8"> <title>Configurar contraseña</title> <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script> <style> /* Reset básico */ * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; } body { background: linear-gradient(135deg, #74ebd5, #ACB6E5); height: 100vh; display: flex; justify-content: center; align-items: center; } .container { background: #fff; padding: 40px 50px; border-radius: 15px; box-shadow: 0 15px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; } h2 { color: #333; margin-bottom: 25px; font-size: 1.8em; } input[type="password"] { width: 100%; padding: 12px 15px; margin: 10px 0; border: 1px solid #ccc; border-radius: 8px; outline: none; transition: 0.3s; } input[type="password"]:focus { border-color: #74ebd5; box-shadow: 0 0 8px rgba(116,235,213,0.4); } button { width: 100%; padding: 12px; background: #74ebd5; border: none; border-radius: 8px; color: #fff; font-size: 1em; cursor: pointer; transition: 0.3s; margin-top: 15px; } button:hover { background: #67d9c6; } #message { margin-top: 15px; font-size: 0.95em; color: #e74c3c; /* rojo para errores */ min-height: 20px; } #message.success { color: #27ae60; /* verde para éxito */ } </style> </head> <body> <div class="container"> <h2>Establecer contraseña</h2> <input type="password" id="password" placeholder="Nueva contraseña"> <input type="password" id="confirmPassword" placeholder="Confirmar contraseña"> <button id="saveBtn">Guardar</button> <p id="message"></p> </div> <script> const supabaseUrl = "https://wptspqcmjstvuwugcepu.supabase.co"; const supabaseKey = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6IndwdHNwcWNtanN0dnV3dWdjZXB1Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzA2MjIxMjQsImV4cCI6MjA4NjE5ODEyNH0.teEFc_0NR8MuYygh8KPSXq3yKdPUABuoJvP5QHhZjq4"; const supabase = window.supabase.createClient(supabaseUrl, supabaseKey); const message = document.getElementById("message"); const hash = window.location.hash.substring(1); const params = new URLSearchParams(hash); const access_token = params.get('access_token'); if (!access_token) { message.textContent = "Enlace inválido o expirado."; document.getElementById("saveBtn").disabled = true; } else { supabase.auth.setSession({ access_token: access_token, refresh_token: params.get('refresh_token') }); } document.getElementById("saveBtn").addEventListener("click", async () => { const password = document.getElementById("password").value; const confirmPassword = document.getElementById("confirmPassword").value; const regex = /^(?=.*[a-z])(?=.*[A-Z])(?=.*\d)(?=.*[\W_]).{8,}$/; if (!regex.test(password)) { message.textContent = "Debe tener mínimo 8 caracteres, mayúscula, minúscula, número y símbolo."; message.classList.remove('success'); return; } if (password !== confirmPassword) { message.textContent = "Las contraseñas no coinciden."; message.classList.remove('success'); return; } const { data: user, error } = await supabase.auth.updateUser({ password }); if (error) { message.textContent = "Error: " + error.message; message.classList.remove('success'); } else { message.textContent = "Contraseña configurada correctamente."; message.classList.add('success'); } }); </script> </body> </html>
